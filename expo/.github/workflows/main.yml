name: Build Mobile Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Ensure Android SDK
        run: |
          set -euo pipefail
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            for CANDIDATE in \
              "${ANDROID_SDK_ROOT:-}/cmdline-tools/latest/bin/sdkmanager" \
              "${ANDROID_HOME:-}/cmdline-tools/latest/bin/sdkmanager" \
              "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"; do
              if [ -x "$CANDIDATE" ]; then
                SDKMANAGER="$CANDIDATE"
                break
              fi
            done
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found on runner."
            exit 1
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true

      - name: Generate Android Native Project
        run: |
          if [ ! -d android ]; then
            npx expo prebuild --platform android --non-interactive --no-install
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK Output
        run: |
          ls -lah android/app/build/outputs/apk/release
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  ios-unsigned-ipa:
    name: iOS Unsigned IPA
    runs-on: macos-14
    timeout-minutes: 60
    env:
      CI: true
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Generate iOS Native Project
        run: npx expo prebuild --platform ios --non-interactive --no-install --clean

      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          cd ios
          pod install --repo-update

      - name: Build Unsigned Archive
        run: |
          set -euo pipefail

          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          if [ -z "$WORKSPACE" ]; then
            echo "No xcworkspace found under ios/"
            exit 1
          fi

          APP_PROJECT="$(find ios -maxdepth 1 -name '*.xcodeproj' ! -name 'Pods.xcodeproj' | head -n 1)"
          if [ -z "$APP_PROJECT" ]; then
            echo "No app xcodeproj found under ios/"
            exit 1
          fi

          SCHEME="$(xcodebuild -list -json -project "$APP_PROJECT" | /usr/bin/python3 -c "import json,sys; d=json.load(sys.stdin); schemes=(d.get('project',{}).get('schemes') or []); preferred=[s for s in schemes if 'Tests' not in s and 'UITests' not in s]; print((preferred or schemes or [''])[0])")"
          if [ -z "$SCHEME" ]; then
            echo "No app scheme found for project: $APP_PROJECT"
            exit 1
          fi
          echo "Using workspace: $WORKSPACE"
          echo "Using app project: $APP_PROJECT"
          echo "Using scheme: $SCHEME"

          ARCHIVE_PATH="ios/build/${SCHEME}.xcarchive"
          rm -rf "$ARCHIVE_PATH"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ios/build \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean archive

      - name: Package Unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH="$(find ios/build -type d -path '*/Products/Applications/*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app produced under ios/build"
            find ios/build -maxdepth 4 -type d | sed -n '1,120p'
            exit 1
          fi

          mkdir -p ios/build/Payload
          cp -R "$APP_PATH" ios/build/Payload/

          cd ios/build
          zip -qry MyTarkov-unsigned.ipa Payload

      - name: Upload iOS Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ios/build/MyTarkov-unsigned.ipa
          if-no-files-found: error
